<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Úszóeredmény Kereső - CSV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ced4da; font-size: 16px; margin-bottom: 20px; outline: none; }
        select:focus { border-color: #1a73e8; }
        .result-card { background: #f8f9fa; border-top: 4px solid #1a73e8; padding: 20px; border-radius: 8px; text-align: center; display: none; }
        .time { font-size: 36px; font-weight: bold; color: #1a73e8; margin: 10px 0; }
        .meta { color: #6c757d; font-size: 14px; line-height: 1.6; }
        .loading { text-align: center; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Úszó Ranglista</h1>
    
    <div id="loader" class="loading">Adatok betöltése a CSV fájlból...</div>
    
    <div id="mainContent" style="display:none;">
        <label for="eventSelect">Válassz versenyszámot:</label>
        <select id="eventSelect" onchange="showBest()">
            <option value="">-- Válassz kategóriát --</option>
        </select>

        <div id="resultCard" class="result-card">
            <div style="font-size: 14px; color: #1a73e8; text-transform: uppercase; font-weight: bold;">Legjobb eredmény</div>
            <div id="resTime" class="time"></div>
            <div id="resMeta" class="meta"></div>
        </div>
    </div>
</div>

<script>
    let globalData = [];

    // 1. CSV beolvasása (ügyelj rá, hogy a fájl neve adatok.csv legyen)
    Papa.parse("adatok.csv", {
        download: true,
        header: true,
        encoding: "ISO-8859-2", // Ez kezeli a magyar ékezeteket Windows-os CSV esetén
        skipEmptyLines: true,
        complete: function(results) {
            globalData = results.data;
            setupDropdown(results.data);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        },
        error: function() {
            document.getElementById('loader').innerText = "Hiba: Az adatok.csv fájl nem tölthető be!";
        }
    });

    // 2. Legördülő menü feltöltése a "Type_Long" oszlop alapján
    function setupDropdown(data) {
        const select = document.getElementById('eventSelect');
        // Kiszűrjük az egyedi versenyszámokat
        const uniqueEvents = [...new Set(data.map(item => item.Type_Long))].sort();
        
        uniqueEvents.forEach(event => {
            if(event) {
                let opt = document.createElement('option');
                opt.value = event;
                opt.innerHTML = event;
                select.appendChild(opt);
            }
        });
    }

    // 3. Legjobb eredmény kikeresése és megjelenítése
    function showBest() {
        const selected = document.getElementById('eventSelect').value;
        const card = document.getElementById('resultCard');
        
        if (!selected) { card.style.display = 'none'; return; }

        // Szűrés a választott kategóriára
        const filtered = globalData.filter(d => d.Type_Long === selected);
        
        // Sorbarendezés idő szerint (növekvő: a legkisebb idő a legjobb)
        filtered.sort((a, b) => a.Time.localeCompare(b.Time));

        const best = filtered[0];
        
        document.getElementById('resTime').innerText = best.Time;
        document.getElementById('resMeta').innerHTML = `
            <strong>Verseny:</strong> ${best.Race}<br>
            <strong>Dátum:</strong> ${best.Date}<br>
            <strong>Helyezés:</strong> ${best.Rank}. hely
        `;
        
        card.style.display = 'block';
    }
</script>

</body>
</html>
